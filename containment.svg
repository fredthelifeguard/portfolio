<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="csTitle csDesc">
  <title id="csTitle">The Containment Spectrum</title>
  <desc id="csDesc">A horizontal spectrum from tool-agnostic to bias-laden. A pencil sits at the agnostic end, a sword at the bias-laden end, and an epee near the sword shows bias contained by rule and guard. Artificial intelligence spans the middle as a gradation, not a point.</desc>

  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a1a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#1a1a1a" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <text x="80" y="46" font-family="'IBM Plex Mono','Courier New',monospace" font-size="11" letter-spacing="0.12em" fill="#8a8a8a">FIG. 01</text>
  <text x="80" y="84" font-family="Newsreader, Georgia, 'Times New Roman', serif" font-size="30" fill="#1a1a1a">The Containment Spectrum</text>
  <text x="80" y="110" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#6a6a6a">Every tool carries bias, from none to by-design. It can be contained &#8212; never removed.</text>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <rect x="98" y="170" width="66" height="16" />
    <line x1="98" y1="175.5" x2="164" y2="175.5" stroke-width="0.75"/>
    <line x1="98" y1="180.5" x2="164" y2="180.5" stroke-width="0.75"/>
    <path d="M164 170 L186 178 L164 186 Z"/>
    <path d="M179.5 175.6 L186 178 L179.5 180.4"/>
    <rect x="88" y="171.5" width="10" height="13" rx="2"/>
  </g>

  <g stroke="#1a1a1a" fill="none" stroke-linecap="round">
    <circle cx="491" cy="178" r="4" stroke-width="1.5"/>
    <line x1="495" y1="178" x2="512" y2="178" stroke-width="4"/>
    <path d="M516 163 A 9 15 0 0 1 516 193" stroke-width="1.5"/>
    <line x1="516" y1="178" x2="612" y2="178" stroke-width="2"/>
    <circle cx="614" cy="178" r="2.4" fill="#1a1a1a" stroke="none"/>
  </g>

  <g stroke="#1a1a1a" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="668" cy="178" r="5" stroke-width="1.5"/>
    <line x1="673" y1="178" x2="700" y2="178" stroke-width="5"/>
    <line x1="702" y1="160" x2="702" y2="196" stroke-width="2.5"/>
    <path d="M704 171.5 L806 178 L704 184.5 Z" stroke-width="1.5"/>
  </g>

  <text x="140" y="222" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" letter-spacing="0.14em" fill="#1a1a1a">PENCIL</text>
  <text x="140" y="240" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#6a6a6a">lends no bias to its user</text>

  <text x="556" y="222" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" letter-spacing="0.14em" fill="#1a1a1a">EPEE</text>
  <text x="556" y="240" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#6a6a6a">bias contained by rule and guard</text>

  <text x="752" y="222" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" letter-spacing="0.14em" fill="#1a1a1a">SWORD</text>
  <text x="752" y="240" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#6a6a6a">bias by design</text>

  <g stroke="#9a9a9a" stroke-width="1" stroke-dasharray="1.5 4">
    <line x1="140" y1="250" x2="140" y2="274"/>
    <line x1="556" y1="250" x2="556" y2="274"/>
    <line x1="752" y1="250" x2="752" y2="274"/>
  </g>

  <rect x="320" y="272" width="380" height="15" fill="url(#fade)"/>

  <line x1="80" y1="280" x2="820" y2="280" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="80" y1="272" x2="80" y2="288" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="820" y1="272" x2="820" y2="288" stroke="#1a1a1a" stroke-width="1.5"/>

  <text x="80" y="312" font-family="'IBM Plex Mono','Courier New',monospace" font-size="11" letter-spacing="0.14em" fill="#1a1a1a">TOOL-AGNOSTIC</text>
  <text x="820" y="312" text-anchor="end" font-family="'IBM Plex Mono','Courier New',monospace" font-size="11" letter-spacing="0.14em" fill="#1a1a1a">BIAS-LADEN</text>

  <path d="M320 326 L320 333 L700 333 L700 326" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <text x="510" y="352" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" letter-spacing="0.12em" fill="#1a1a1a">ARTIFICIAL INTELLIGENCE &#8212; A GRADATION, NOT A POINT</text>

  <text x="820" y="398" text-anchor="end" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#8a8a8a">The bias was never removed. It was contained.</text>
</svg>
